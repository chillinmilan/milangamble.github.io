<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milan Gamble</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Geist:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="name-block">
    <h1>Milan Gamble</h1>
  </div>

  <div class="detail-block">
    <div class="bio">
      <p>Manager, Product Manager at <strong>Qualtrics</strong> (previously Clarabridge)</p>
      <p>way back, <strong>MicroStrategy</strong> and the <strong>Peace Corps</strong></p>
      <p>w/ a BS in Math from <strong>Virginia Tech</strong></p>
    </div>
    <div class="links">
      <a class="linkedin-btn" href="https://linkedin.com/in/milangamble" target="_blank" rel="noopener" aria-label="LinkedIn">
        <i class="fab fa-linkedin-in"></i>
      </a>
    </div>
  </div>

  <script>
    const bg = document.getElementById('bg');
    let targetX = 0, targetY = 0;
    let curX = 0, curY = 0;

    document.addEventListener('mousemove', (e) => {
      targetX = (e.clientX / window.innerWidth) - 0.5;
      targetY = (e.clientY / window.innerHeight) - 0.5;
    });

    document.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      targetX = (t.clientX / window.innerWidth) - 0.5;
      targetY = (t.clientY / window.innerHeight) - 0.5;
    }, { passive: true });

    function animate() {
      curX += (targetX - curX) * 0.06;
      curY += (targetY - curY) * 0.06;
      bg.style.transform = `translate(${-curX * 28}px, ${-curY * 16}px)`;
      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
